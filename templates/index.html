<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نايل شات - Nile Chat AI</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .chat-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 2px 10px #ccc; overflow: hidden; }
        .chat-header { background: #007bff; color: white; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold; }
        .chat-messages { height: 400px; padding: 15px; overflow-y: auto; border-bottom: 1px solid #ddd; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 5px; }
        .user-msg { background: #e1ffc7; text-align: right; align-self: flex-start; }
        .ai-msg { background: #f1f0f0; text-align: left; }
        .chat-input { display: flex; padding: 10px; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        .chat-input button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">نايل شات - Nile Chat AI</div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا... (اكتب @ai قبل رسالتك للتحدث مع الذكاء الاصطناعي)">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    // ربط الشات بالسيرفر تلقائياً
    const socket = io();
    const room = "global_room";
    const username = "مستخدم_" + Math.floor(Math.random() * 1000);

    socket.emit('join', { room: room, username: username });

    socket.on('message', function(data) {
        const messagesDiv = document.getElementById('messages');
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        
        if (data.username === 'NileAI') {
            msgDiv.classList.add('ai-msg');
            msgDiv.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
        } else {
            msgDiv.classList.add('user-msg');
            msgDiv.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
        }
        
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (text !== '') {
            socket.emit('message', { room: room, username: username, message: text });
            input.value = '';
        }
    }
</script>
</body>
</html>
